name: Build and Publish Release Artifact

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: abap-accelerator-enterprise
  IMAGE_TAG: ${{ github.ref_name }}
  PLATFORM: linux/amd64
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/abap-accelerator-enterprise

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and export Docker image
        run: make docker-export

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}.tar.gz

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.GHCR_IMAGE }}:latest
          docker push ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.GHCR_IMAGE }}:latest
